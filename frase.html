<body>
<div class="frases">
    <h3 id="texto-frase">Cargando frase...</h3>
    <h4 id="autor-frase"></h4>
    <p>
        <a href="index.html">
            Volver a intentar</a>
    </p>
</div>
</body>

<script>
    const frases = [
        { texto: "Eres válida", autor: "Paula" },
        { texto: "Que divertit!", autor: "Alice" },
        { texto: "Hay que cambiar la diversión", autor: "Dani" },
        { texto: "Si nos organizamos...", autor: "Judit" },
        { texto: "No puedo, tengo judo", autor: "Claudia" },
        { texto: "Ai nena", autor: "Dani" },
        { texto: "Chill pernil", autor: "Judit" },
        { texto: "Llego tarde", autor: "Dani" },
        { texto: "Hi ha un accident a l'autopista", autor: "Paula" },
        { texto: "¿Salimos este jueves?", autor: "David" },
        { texto: "Hazlo por la anecdota", autor: "Soraya" },
    ];

    // 2. Leemos el número que viene en la URL (?id=0)
    const urlParams = new URLSearchParams(window.location.search);
    let id = urlParams.get('id');

    // 3. Si por error no hay ID o es mayor que la lista, ponemos uno al azar
    if (id === null || id >= frases.length) {
        id = Math.floor(Math.random() * frases.length);
    }

    // 4. Inyectamos el texto en el HTML
    document.getElementById('texto-frase').innerText = `${frases[id].texto}`;
    document.getElementById('autor-frase').innerText = `Creado por ${frases[id].autor}`;
</script>



</html>
